<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-10">

<h1 class="text-3xl mb-10">🎛 RCU PANEL</h1>

<div id="app"></div>

<script>
function load(){
fetch('/api/data')
.then(r=>r.json())
.then(d=>{
document.getElementById("app").innerHTML = `
<div>
<p>🥚 RNG: ${d.roles.jajko || "brak"}</p>
<p>🐝 MERCHANT: ${d.roles.merchant || "brak"}</p>
<p>🎰 SPIN: ${d.roles.spin || "brak"}</p>
</div>`;
});
}
load();
</script>

</body>
</html>
