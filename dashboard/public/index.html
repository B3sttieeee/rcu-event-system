<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>RCU Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
  transition: all 0.2s ease;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
  padding: 30px;
}

/* HEADER */
h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  flex: 1;
  padding: 20px;
  border-radius: 15px;
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px rgba(255,255,255,0.1);
}

/* COLORS */
.egg { background: #00ffc8; color:#000; }
.merchant { background: #f59e0b; }
.spin { background: #ff0055; }

/* BADGE */
.badge {
  position: absolute;
  top: 10px;
  right: 15px;
  background: #22c55e;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
}

/* MAIN */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* FORM */
.form {
  background: #020617;
  padding: 20px;
  border-radius: 15px;
}

.form h2 {
  margin-bottom: 15px;
}

label {
  font-size: 12px;
  opacity: 0.7;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #0f172a;
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

/* PREVIEW */
.preview {
  background: #020617;
  padding: 20px;
  border-radius: 15px;
}

.embed {
  background: #111827;
  border-left: 5px solid #6366f1;
  padding: 15px;
  border-radius: 10px;
}

.embed h3 {
  margin-bottom: 10px;
}

.embed img {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>⚙️ RCU EVENT DASHBOARD</h1>

<div class="cards">
  <div class="card egg" onclick="selectEvent('egg')">🥚 RNG EGG</div>
  <div class="card merchant" onclick="selectEvent('merchant')">🐝 MERCHANT</div>
  <div class="card spin" onclick="selectEvent('spin')">🎰 SPIN</div>
</div>

<div class="container">

<!-- FORM -->
<div class="form">
  <h2 id="title">Edytuj event</h2>

  <label>📝 Nazwa</label>
  <input id="name">

  <label>📄 Opis</label>
  <textarea id="desc"></textarea>

  <label>🎨 Kolor (#hex)</label>
  <input id="color">

  <label>🖼 Obraz (link)</label>
  <input id="image">

  <label>🔔 Rola ID</label>
  <input id="role">

  <label>⏰ Godziny (np 0,3,6)</label>
  <input id="hours">

  <button onclick="save()">💾 Zapisz</button>
</div>

<!-- PREVIEW -->
<div class="preview">
  <h2>📡 Preview</h2>

  <div class="embed" id="embed">
    <h3 id="p_name">Event</h3>
    <p id="p_desc">Opis eventu...</p>
    <p id="p_time">⏰ 00:00</p>
    <img id="p_img" style="display:none;">
  </div>

</div>

</div>

<script>

let data = {};
let current = "egg";

async function load(){
  const res = await fetch('/api/data');
  data = await res.json();
  selectEvent("egg");
}

function selectEvent(type){
  current = type;
  const e = data.events[type];

  document.getElementById("title").innerText = "Edytujesz: " + e.name;
  document.getElementById("name").value = e.name;
  document.getElementById("desc").value = e.description;
  document.getElementById("color").value = e.color;
  document.getElementById("image").value = e.image || "";
  document.getElementById("role").value = e.role || "";
  document.getElementById("hours").value = e.hours.join(",");

  updatePreview();
}

function updatePreview(){
  document.getElementById("p_name").innerText = name.value;
  document.getElementById("p_desc").innerText = desc.value;
  document.getElementById("p_time").innerText = "⏰ " + hours.value;

  const img = document.getElementById("p_img");
  if(image.value){
    img.src = image.value;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  document.getElementById("embed").style.borderLeftColor = color.value;
}

function save(){
  data.events[current] = {
    name: name.value,
    description: desc.value,
    color: color.value,
    image: image.value,
    role: role.value,
    hours: hours.value.split(',').map(x=>parseInt(x))
  };

  fetch('/api/save',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });

  alert("Zapisano!");
}

document.querySelectorAll("input,textarea").forEach(el=>{
  el.addEventListener("input", updatePreview);
});

load();

</script>

</body>
</html>
