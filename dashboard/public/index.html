<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RCU Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#060b17] text-white p-10">

<h1 class="text-5xl font-bold mb-12 glow-text">🎛 RCU PANEL</h1>

<!-- EVENT CARDS -->
<div id="events" class="grid md:grid-cols-3 gap-8 mb-12"></div>

<!-- SETTINGS -->
<div class="glass p-8 rounded-2xl">

<h2 class="text-2xl mb-6">⚙️ CONFIG</h2>

<div class="grid md:grid-cols-3 gap-6">

<input id="r1" class="input" placeholder="🥚 RNG ROLE ID">
<input id="r2" class="input" placeholder="🐝 MERCHANT ROLE ID">
<input id="r3" class="input" placeholder="🎰 SPIN ROLE ID">

</div>

<h2 class="text-2xl mt-10 mb-4">📝 EMBEDS</h2>

<textarea id="e1" class="input h-20"></textarea>
<textarea id="e2" class="input h-20"></textarea>
<textarea id="e3" class="input h-20"></textarea>
<textarea id="e4" class="input h-20"></textarea>

<button onclick="save()" class="btn mt-6">💾 ZAPISZ</button>

</div>

<script src="app.js"></script>
</body>
</html>
