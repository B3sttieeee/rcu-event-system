<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>RCU Dashboard</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    margin: 0;
}

h1 {
    text-align: center;
    margin: 20px;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.card {
    flex: 1;
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.editor {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin: 20px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    margin-top: 10px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>⚙️ RCU EVENT DASHBOARD</h1>

<div class="container" id="events"></div>

<div class="editor" id="editor" style="display:none;">
    <h2 id="editTitle"></h2>

    <label>Nazwa</label>
    <input id="name">

    <label>Opis</label>
    <textarea id="desc"></textarea>

    <label>Kolor (#hex)</label>
    <input id="color">

    <label>Obraz (link)</label>
    <input id="image">

    <label>Rola ID (ping)</label>
    <input id="role">

    <label>Godziny (np 0,3,6)</label>
    <input id="hours">

    <button onclick="save()">💾 Zapisz</button>
</div>

<script>
let DATA;
let currentKey;

async function load() {
    const res = await fetch("/api/data");
    DATA = await res.json();

    const container = document.getElementById("events");
    container.innerHTML = "";

    for (let key in DATA.events) {
        const e = DATA.events[key];

        const div = document.createElement("div");
        div.className = "card";
        div.style.background = e.color;

        div.innerHTML = `
            <h2>${e.name}</h2>
            <p>${e.description}</p>
            <p>⏰ ${e.hours.join(", ")}</p>
        `;

        div.onclick = () => openEditor(key);

        container.appendChild(div);
    }
}

function openEditor(key) {
    currentKey = key;
    const e = DATA.events[key];

    document.getElementById("editor").style.display = "block";

    document.getElementById("editTitle").innerText = e.name;

    document.getElementById("name").value = e.name;
    document.getElementById("desc").value = e.description;
    document.getElementById("color").value = e.color;
    document.getElementById("image").value = e.image;
    document.getElementById("role").value = e.role || "";
    document.getElementById("hours").value = e.hours.join(",");
}

async function save() {
    const e = DATA.events[currentKey];

    e.name = document.getElementById("name").value;
    e.description = document.getElementById("desc").value;
    e.color = document.getElementById("color").value;
    e.image = document.getElementById("image").value;
    e.role = document.getElementById("role").value;
    e.hours = document.getElementById("hours").value.split(",").map(Number);

    await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(DATA)
    });

    alert("Zapisano!");
    load();
}

load();
</script>

</body>
</html>
