<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RCU Dashboard</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card {
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h2 { margin-top:0; }

input {
    width:100%;
    padding:10px;
    margin:5px 0 10px;
    border-radius:8px;
    border:none;
}

button {
    background:#5865F2;
    border:none;
    padding:10px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="app">Ładowanie...</div>

<script>
async function load() {
    const res = await fetch('/api/data');
    const data = await res.json();

    let html = "";

    for (const key in data.events) {

        const e = data.events[key];

        html += `
        <div class="card">
            <h2>${e.name}</h2>

            Opis
            <input id="${key}-desc" value="${e.description || ""}">

            Kolor
            <input id="${key}-color" value="${e.color || ""}">

            Obraz URL
            <input id="${key}-image" value="${e.image || ""}">

            Rola ID
            <input id="${key}-role" value="${e.role || ""}">

            Godziny (np 1,4,7)
            <input id="${key}-hours" value="${e.hours.join(",")}">

            <button onclick="save('${key}')">Zapisz</button>
        </div>
        `;
    }

    document.getElementById("app").innerHTML = html;
}

async function save(key) {

    const payload = {
        name: key.toUpperCase(),
        description: document.getElementById(key+"-desc").value,
        color: document.getElementById(key+"-color").value,
        image: document.getElementById(key+"-image").value,
        role: document.getElementById(key+"-role").value,
        hours: document.getElementById(key+"-hours").value.split(',').map(x=>parseInt(x))
    };

    await fetch('/api/save/' + key, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
    });

    alert("Zapisano");
}

load();
</script>

</body>
</html>
