<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>RCU Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>⚙️ RCU DASHBOARD</h1>

<div class="container" id="app">
    Ładowanie...
</div>

<script>
async function load() {
    try {
        const res = await fetch('/api/data');
        const data = await res.json();

        if (!data || !data.events) {
            document.getElementById("app").innerHTML = "❌ Brak danych";
            return;
        }

        let html = "";

        for (const key in data.events) {

            const e = data.events[key];

            html += `
            <div class="card">
                <h2>${e.name || "Brak nazwy"}</h2>

                <label>Opis</label>
                <input id="${key}-desc" value="${e.description || ""}">

                <label>Kolor (#hex)</label>
                <input id="${key}-color" value="${e.color || "#ffffff"}">

                <label>Obraz (link)</label>
                <input id="${key}-image" value="${e.image || ""}">

                <label>Rola ID</label>
                <input id="${key}-role" value="${e.role || ""}">

                <label>Godziny (np 0,3,6)</label>
                <input id="${key}-hours" value="${(e.hours || []).join(",")}">

                <button onclick="save('${key}')">💾 Zapisz</button>
            </div>
            `;
        }

        document.getElementById("app").innerHTML = html;

    } catch (err) {
        document.getElementById("app").innerHTML = "❌ Błąd ładowania";
    }
}

async function save(key) {

    const payload = {
        description: document.getElementById(key+"-desc").value,
        color: document.getElementById(key+"-color").value,
        image: document.getElementById(key+"-image").value,
        role: document.getElementById(key+"-role").value,
        hours: document.getElementById(key+"-hours").value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x))
    };

    await fetch('/api/save/' + key, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    alert("✅ Zapisano");
}

load();
</script>

</body>
</html>
