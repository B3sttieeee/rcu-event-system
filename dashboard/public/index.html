<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>RCU Dashboard</title>
</head>

<body class="bg-gray-900 text-white min-h-screen p-10">

<h1 class="text-4xl font-bold mb-10">🎛 RCU Dashboard</h1>

<div id="cards" class="grid md:grid-cols-3 gap-6"></div>

<script>

function card(title, roleKey, roleId, color){
return `
<div class="bg-gray-800 p-6 rounded-2xl shadow-lg">
  <h2 class="text-xl mb-3">${title}</h2>

  <p class="mb-3 text-gray-400">
    ${roleId ? roleId : "Brak roli"}
  </p>

  <input id="${roleKey}" placeholder="Wklej ID roli"
  class="w-full p-2 rounded bg-gray-700 mb-3"/>

  <button onclick="setRole('${roleKey}')"
  class="w-full py-2 rounded ${color}">
    Zapisz
  </button>
</div>`;
}

function load(){
fetch('/api/data')
.then(r=>r.json())
.then(d=>{
document.getElementById("cards").innerHTML =
card("🥚 RNG EGG","jajko",d.roles.jajko,"bg-green-600") +
card("🐝 MERCHANT","merchant",d.roles.merchant,"bg-yellow-500") +
card("🎰 SPIN","spin",d.roles.spin,"bg-red-600");
});
}

function setRole(type){
const roleId = document.getElementById(type).value;

fetch('/api/set-role',{
method:"POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify({type, roleId})
})
.then(()=> {
alert("Zapisano!");
load();
});
}

load();

</script>

</body>
</html>
