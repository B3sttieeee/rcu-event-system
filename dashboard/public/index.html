<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RCU Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0b1220] text-white p-10">

<h1 class="text-4xl font-bold mb-10">🎛 RCU EVENT PANEL</h1>

<div class="grid md:grid-cols-3 gap-6 mb-10" id="events"></div>

<div class="bg-[#111827] p-6 rounded-xl shadow-xl">
<h2 class="text-2xl mb-6">⚙️ Ustawienia</h2>

<div class="grid md:grid-cols-3 gap-4">

<div>
<label>🥚 RNG godziny</label>
<input id="egg" class="input" placeholder="0,3,6...">
</div>

<div>
<label>🐝 Merchant godziny</label>
<input id="merchant" class="input">
</div>

<div>
<label>🎰 Spin godziny</label>
<input id="spin" class="input">
</div>

</div>

<button onclick="save()" class="btn mt-6">💾 Zapisz</button>
</div>

<script src="app.js"></script>
</body>
</html>
